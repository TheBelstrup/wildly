    <style>
        :root { --ios-bg: #fdfcfb; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: "Georgia", serif; 
            background-color: var(--ios-bg);
            color: #1c1c1e;
            user-select: none;
        }
        .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-active:active { transform: scale(0.97); opacity: 0.9; }
        .card { background: white; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .type-badge { font-family: sans-serif; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 12px; }
        .badge-svamp { background: #fef3c7; color: #92400e; }
        .badge-bær { background: #fee2e2; color: #991b1b; }
        .badge-plante { background: #dcfce7; color: #166534; }
        .badge-nød { background: #f3f4f6; color: #374151; }
        
        .id-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #064e3b; margin-bottom: 2px; font-family: sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        .season-trigger {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .season-select-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        /* Season Bar specific styles */
        .month-pill {
            flex: 1;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 900;
            font-family: sans-serif;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .month-active {
            background-color: #064e3b;
            color: white;
            box-shadow: 0 2px 4px rgba(6, 78, 59, 0.2);
        }
        .month-inactive {
            background-color: #f1f1f1;
            color: #626262;
        }

		/* Galleri */
	    /* Skjul scrollbar i galleriet */
	    .no-scrollbar::-webkit-scrollbar {
	        display: none;
	    }
	    .no-scrollbar {
	        -ms-overflow-style: none;
	        scrollbar-width: none;
	    }
	    
	    /* Gør swipe mere responsiv på iOS */
	    #swipe-gallery {
	        -webkit-overflow-scrolling: touch;
	    }

		.fab-container {
		    position: fixed;
		    bottom: 90px;
		    left: 0;
		    right: 0;
		    display: flex;
		    justify-content: center;
		    z-index: 100;
		    pointer-events: none; 
		}

		/* Save spot button */
		.floating-save-btn {
		    pointer-events: auto;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    gap: 8px;
		    padding: 12px 20px;
		    background-color: #064e3b;
		    color: white;
		    border-radius: 9999px;
		    border: 2px solid white;
		    font-weight: bold;
		    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		    font-size: 14px;
		    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
		    animation: fab-pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		    transition: transform 0.1s ease;
		}
				
		@keyframes pop-in {
		    0% { transform: scale(0) rotate(-45deg); opacity: 0; }
		    100% { transform: scale(1) rotate(0); opacity: 1; }
		}
		
		/* GPS boble */

		@keyframes radar-pulse {
	        0% { transform: scale(1); opacity: 0.8; }
	        100% { transform: scale(2.5); opacity: 0; }
	    }
	
	    .animate-radar-pulse {
	        animation: radar-pulse 2s cubic-bezier(0, 0, 0.2, 1) infinite;
	    }
				
		.gps-ok-signal { background-color: #fff7ed !important; border: 1px solid #fdba74 !important;}
		.gps-ok-signal .gps-text { color: #9a3412 !important; } /* orange-900 */
		.gps-ok-signal .gps-ping { background-color: rgba(249, 115, 22, 0.3) !important; }
		.gps-poor-signal { background-color: #fee2e2 !important; border: 1px solid #fca5a5 !important; }
		.gps-poor-signal .gps-text { color: #991b1b !important; }
		.gps-poor-signal .gps-ping { background-color: rgba(239, 68, 68, 0.4) !important; }

		.map-offline-placeholder {
		    background-color: #e5e7eb;
		    background-image: radial-gradient(#d1d5db 1px, transparent 1px);
		    background-size: 20px 20px;
		    display: flex;
		    flex-direction: column;
		    align-items: center;
		    justify-content: center;
		    text-align: center;
		    color: #9ca3af;
		}
    </style>

    <script>
		//GLOBALS
		let ui = {};
		let map = null;
		let activeMarkers = {};
		let currentPageId = 'start';
		let currentWizardNode = {};
		let wizardMushroomData = {};
		let isLoggedIn = false;
		let userSettings = JSON.parse(localStorage.getItem('userSettings')) || {
		    lang: 'da',
		    country: 'DK',
		    region: 'Hele landet'
		};
        let activeSeason = 'all';
		let appConfig = {};
		let geoData = {};
		let database = {};
		let locationEditorWatchId = null; 
		let currentEditorAccuracy = 0;
		const photoStorage = {
		    dbName: "WildlyDB",
		    storeName: "photos",
				
		    // Gem et billede til et specifikt fund
		    async add(spotUid, base64Data) {
				const db = await getDB();
		        return new Promise((resolve, reject) => {
		            const tx = db.transaction(this.storeName, "readwrite");
		            const store = tx.objectStore(this.storeName);
		            const request = store.add({ spotUid, data: base64Data, date: Date.now() });
		            request.onsuccess = () => resolve();
		            request.onerror = () => reject();
		        });
		    },
		
		    // Hent alle billeder til et specifikt fund
		    async getAll(spotUid) {
				const db = await getDB();
		        return new Promise((resolve) => {
		            const tx = db.transaction(this.storeName, "readonly");
		            const store = tx.objectStore(this.storeName);
		            const index = store.index("spotUid");
		            const request = index.getAll(spotUid);
		            request.onsuccess = () => resolve(request.result);
		        });
		    },
		
		    // Slet et specifikt billede
		    async delete(photoId) {
				const db = await getDB();
		        const tx = db.transaction(this.storeName, "readwrite");
		        tx.objectStore(this.storeName).delete(photoId);
		    }
		};
		
		const mapStorage = {
		    dbName: "WildlyDB",
		    storeName: "maps", // En separat skuffe til kort		
		    // Gem kort (type er enten 'overview' eller 'detail')
		    async save(spotUid, type, base64Data) {
				const db = await getDB();
		        return new Promise((resolve, reject) => {
		            const tx = db.transaction(this.storeName, "readwrite");
		            const store = tx.objectStore(this.storeName);
		            // Vi gemmer med en nøgle som "overview_abc-123"
		            const request = store.put(base64Data, `${type}_${spotUid}`);
		            request.onsuccess = () => resolve();
		            request.onerror = () => reject();
		        });
		    },
		
		    // Hent kort
		    async get(spotUid, type) {
				const db = await getDB();
		        return new Promise((resolve) => {
		            const tx = db.transaction(this.storeName, "readonly");
		            const store = tx.objectStore(this.storeName);
		            const request = store.get(`${type}_${spotUid}`);
		            request.onsuccess = () => resolve(request.result);
		        });
		    },
			
			async delete(spotUid) {
				const db = await getDB();
			    const tx = db.transaction(this.storeName, "readwrite");
			    const store = tx.objectStore(this.storeName);
			
			    // Slet begge billedtyper tilknyttet dette spot
			    store.delete(`overview_${spotUid}`);
			    store.delete(`detail_${spotUid}`);
			
			    return new Promise((resolve, reject) => {
			        tx.oncomplete = () => {
			            resolve();
			        };
			        tx.onerror = (e) => {
			            console.error("Error deleting offline map data:", e.target.error);
			            reject(e.target.error);
			        };
			    });
			}
		};

		function getDB() {
		    return new Promise((resolve, reject) => {
		        const request = indexedDB.open("WildlyDB", 2);
		        request.onupgradeneeded = (e) => {
		            const db = e.target.result;
		            
		            if (!db.objectStoreNames.contains("photos")) {
		                const photoStore = db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
		                photoStore.createIndex("spotUid", "spotUid", { unique: false });
		            }
		            
		            if (!db.objectStoreNames.contains("maps")) {
		                db.createObjectStore("maps");
		            }
		        };
		
		        request.onsuccess = () => resolve(request.result);
		        request.onerror = (e) => reject(e.target.error);
		    });
		}

		// Hjælpefunktion til at flette (merge) objekter dybt sammen
		function deepMerge(target, ...sources) {
		    if (!sources.length) return target;
		    const source = sources.shift();
		
		    if (target && typeof target === 'object' && !Array.isArray(target) && 
		        source && typeof source === 'object' && !Array.isArray(source)) {
		        for (const key in source) {
		            if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
		                if (!target[key]) Object.assign(target, { [key]: {} });
		                deepMerge(target[key], source[key]);
		            } else {
		                Object.assign(target, { [key]: source[key] });
		            }
		        }
		    }
		    return deepMerge(target, ...sources);
		}
		
		async function loadDatabase() {
			const lang = userSettings.lang;
			const country = userSettings.country;
			const region = userSettings.region;

			try {
				// 1. Hent de tre nødvendige filer parallelt
				const [uniRes, langRes, regRes] = await Promise.all([
					fetch('data/universal.json'),
					fetch(`data/lang/${lang}.json`),
					fetch(`data/regions/${country}.json`)
				]);
		
				const universal = await uniRes.json();
				const langData = await langRes.json();
				const regionData = await regRes.json();
		
				const flatDatabase = {};
		
				// 2. Loop KUN over de arter, der findes i det valgte land
				for (const id in regionData) {
					const regObj = regionData[id];
					const commonData = regObj.all || {};
					const specificRegionData = regObj[region];
		
					// SIKKERHEDS-TJEK: Vokser den overhovedet her?
					// Hvis der ikke er nogen 'common' data, og den heller ikke er nævnt 
					// i den valgte region, så spring den over.
					if (Object.keys(commonData).length === 0 && !specificRegionData) {
						continue; 
					}
		
					let entry = { id: id };
		
					// A: Start med at hente de universelle grunddata (type, latin)
					if (universal[id]) {
						deepMerge(entry, universal[id]);
					}
		
					// B: Læg de globale sprog-tekster på (navn, traits, id_keys)
					if (langData[id]) {
						deepMerge(entry, langData[id]);
					}
		
					// C: Pålæg Common Base Data for landet (habitats, months osv.)
					let commonBase = { ...commonData };
					delete commonBase.i18n; // Undgå at overskrive med hele i18n objektet
					deepMerge(entry, commonBase);
		
					// D: Pålæg Common Sprog Data for landet (f.eks. dansk extended_habitat)
					if (commonData.i18n && commonData.i18n[lang]) {
						deepMerge(entry, commonData.i18n[lang]);
					}
		
					// E: Hvis brugerens valgte region har unikke data, så overskriv med dem!
					if (specificRegionData) {
						let specificBase = { ...specificRegionData };
						delete specificBase.i18n;
						deepMerge(entry, specificBase); // Kan f.eks. ændre 'months' for Nordjylland
		
						// F: Regionale sprog-variationer (f.eks. lokal forvekslingsfare)
						if (specificRegionData.i18n && specificRegionData.i18n[lang]) {
							deepMerge(entry, specificRegionData.i18n[lang]);
						}
					}
		
					// 3. Tilføj det færdige, skræddersyede objekt til appens database
					flatDatabase[id] = entry;
				}

				database = flatDatabase;
		
			} catch (error) {
				console.error("Could not parse and build database:", error);
				return null;
			}
		}

		function getDistance(lat1, lon1, lat2, lon2) {
		    const R = 6371; // Jordens radius i km
		    const dLat = (lat2 - lat1) * Math.PI / 180;
		    const dLon = (lon2 - lon1) * Math.PI / 180;
		    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
		              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
		    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
		    const d = R * c;
		    return d; // Returnerer afstand i km
		}

		        // 2. MATEMATIKKEN: Vi beregner et "falskt" centerpunkt
		        // Omdan GPS-koordinater til pixels på skærmen
		        let targetPoint = window.currentMap.project(marker.getLatLng(), targetZoom);
		        
		        // Dette flytter kameraet OP, hvilket betyder at pinden ender længere NEDE på kortet.
		        targetPoint.y -= 120; 
		        
		        // Omdan de nye pixels tilbage til GPS-koordinater
		        const targetLatLng = window.currentMap.unproject(targetPoint, targetZoom);
		
		        // 3. Flyt kortet til det nye "falske" center
		        window.currentMap.setView(targetLatLng, targetZoom, { animate: true });
		
		        // 4. Åbn popup (Vi venter lige et splitsekund så kortet er begyndt at rykke sig)
		        setTimeout(() => {

		        }, 300);

		function centerMapOnStep() {

		function startLiveGpsTracking() {
			// Tjek om browseren overhovedet understøtter Geolocation
		    if (!navigator.geolocation) {
		        console.error("Geolocation is not supported by this browser.");
		        return;
		    }
		
		    // Vi bruger watchPosition i stedet for getCurrentPosition, 
		    // så vi får løbende opdateringer mens brugeren bevæger sig.
		    locationEditorWatchId = navigator.geolocation.watchPosition((pos) => {
		        // 1. Gem den aktuelle position i en global variabel.
		        // Denne bruges af "Centrér" knappen og til offline-gemning.
		        window.lastKnownLocation = {
		            lat: pos.coords.latitude,
		            lng: pos.coords.longitude
		        };
		        // 2. Opdater den globale præcision (Accuracy)
		        currentEditorAccuracy = pos.coords.accuracy;
		        // 3. Opdater det visuelle udtryk i GPS-boblen (Farve, størrelse og tekst)
		        updateGpsBobble(currentEditorAccuracy);
		    }, (err) => {
		        // Håndtering af fejl (f.eks. hvis brugeren afviser adgang eller mister signal)
		        const message = document.getElementById('gps-message');
		        if (message) {
		            message.innerText = ui.gps_searching;
		            message.classList.replace('text-emerald-950', 'text-red-700');
		        }
		    }, { 
		        enableHighAccuracy: true, // Tvinger telefonen til at bruge GPS-chippen (ikke bare Wifi)
		        maximumAge: 0,            // Vi vil ikke have gamle (cachede) positioner
		        timeout: 10000            // Giv op efter 10 sekunder hvis intet signal findes
		    });
		}
		
		function updateGpsBobble(accuracy) {
		    const bobble = document.getElementById('gps-bobble');
		    const accuracyLabel = document.getElementById('gps-accuracy');
		    const ping = document.getElementById('gps-ping');
		    const message = document.getElementById('gps-message');
		
		    if (!bobble) return;
		
		    accuracyLabel.innerText = `${Math.round(accuracy)}m`;
		
		    // Skalering af boblen
		    const baseScale = 1 + (1 - (accuracy / 50)); 
		    const finalScale = Math.min(Math.max(baseScale, 0.9), 1.2); 
		    bobble.style.transform = `scale(${finalScale})`;
		
		    // Fjern alle farve-klasser først for at nulstille
		    bobble.classList.remove('gps-poor-signal', 'gps-ok-signal');
		    message.classList.remove('text-red-700', 'text-orange-600', 'text-emerald-950');
		
		    if (accuracy > 24) {
		        // NIVEAU 1: DÅRLIGT (> 30m)
		        bobble.classList.add('gps-poor-signal');
		        ping.style.opacity = "0";
		        message.innerText = ui.gps_poor;
		        message.classList.add('text-red-700');
		    } 
		    else if (accuracy > 8) {
		        // NIVEAU 2: OK / SØGER BEDRE (15m - 30m)
		        bobble.classList.add('gps-ok-signal');
		        ping.style.opacity = "0.5";
		        message.innerText = ui.gps_ok;
		        message.classList.add('text-orange-600');
		    } 
		    else {
		        // NIVEAU 3: PERFEKT (< 15m)
		        // Ingen ekstra klasser (standard er grøn)
		        ping.style.opacity = "1";
		        message.innerText = ui.gps_perfect;
		        message.classList.add('text-emerald-950');
		    }
		}
		
		async function saveFinalLocation(resId) {
			let spotUid;
			
			if (!navigator.onLine) {
		        // OFFLINE: Brug den rå GPS position (sidste kendte fra boblen)
		        if (window.lastKnownLocation) {
		            finalLat = window.lastKnownLocation.lat;
		            finalLng = window.lastKnownLocation.lng;
		        } else {
		            // Fallback hvis GPS slet ikke har fået fix endnu
		            alert(ui.gps_searching);
		            return;
		        }
		    } else {
		        // ONLINE: Brug kortets center (tillader at brugeren har rykket markøren)
		        const center = map.getCenter();
		        finalLat = center.lat;
		        finalLng = center.lng;
		        console.log("Online: Gemmer kortets center-koordinat");
		    }

			let spots = JSON.parse(localStorage.getItem('mySpots')) || [];
			if (window.editingSpotUid) {
		        // Vi retter et eksisterende spot
				spotUid = window.editingSpotUid;
		        const index = spots.findIndex(s => s.uid === spotUid);
		        if (index !== -1) {
					spots[index].lat = finalLat;
		            spots[index].lng = finalLng;
		        }
		        window.editingSpotUid = null; // Nulstil
		    } else {
				spotUid = `spot_${crypto.randomUUID()}`;
		        const newDiscovery = { 
		            uid: spotUid,           
		            resId: resId,           
		            lat: finalLat, 
		            lng: finalLng, 
		            acc: currentEditorAccuracy,
		            timestamp: new Date().toISOString(),
		            photos: []              
		        };
		        spots.push(newDiscovery);
		    }
			
			localStorage.setItem('mySpots', JSON.stringify(spots));
			closeLocationEditor();
			try {
				const overlay = document.getElementById('loading-overlay');
			    const statusText = document.getElementById('loading-status-text');
			    
				statusText.innerText = ui.spinner_detail_image;
			    overlay.classList.remove('hidden');
				await syncMissingMaps(spotUid);
				setTimeout(() => {
					overlay.classList.add('hidden');
					navigate('view_spot', { spotId: spotUid });
				}, 500);
				
		    } catch (err) {
		        console.error("Error while retrieving map:", err);
				navigate('view_spot', { spotId: spotUid });
		    }
		}
		
		function closeLocationEditor(shouldGoBack = true) {
		    // Sluk GPS trackeren så den ikke dræner batteri
			if (locationEditorWatchId !== null) {
		        navigator.geolocation.clearWatch(locationEditorWatchId);
		        locationEditorWatchId = null;
		    }
			
			if (map) {
		        try {
		            map.remove();
		        } catch (e) {
		            console.warn("Kortet kunne ikke fjernes (måske aldrig oprettet)");
		        }
		        map = null;
		    }
			
		    const editor = document.getElementById('location-editor');
		    if(editor) editor.remove();

			window.editingSpotUid = null;
			window.lastKnownLocation = null;
		
		    // 5. Hvis vi lukkede via krydset (og ikke via tilbage-knappen), 
		    // så skal vi fjerne det ekstra punkt i historikken
		    if (shouldGoBack && window.history.state?.pageId === 'location_editor') {
		        window.history.back();
		    }
		}
		
		// Henter GPS-koordinater med høj præcision
		const getPreciseLocation = () => {
			return new Promise((resolve, reject) => {
				if (!navigator.geolocation) {
					reject(new Error(ui.map_no_gps));
				}
				navigator.geolocation.getCurrentPosition(
					(pos) => resolve({
						lat: pos.coords.latitude,
						lng: pos.coords.longitude,
						acc: Math.round(pos.coords.accuracy),
						timestamp: new Date().toISOString()
					}),
					(err) => reject(err),
					{ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
				);
			});
		};

		// Håndterer "Gem"-knappen
		async function handleSaveLocation(id, btn) {
			if (btn.disabled) return;
			const originalContent = btn.innerHTML;

					<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
					<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
				</svg>`;
			
			btn.style.width = originalWidth + 'px';
    		btn.disabled = true;
		
			try {		
				btn.innerHTML = spinnerSvg;
				
				const location = await getPreciseLocation();
		        
		        // Åbner editoren og sender ID med
		        showLocationEditor(id, location);

		    }
		}

		async function fetchStaticMap(lat, lng, zoom) {
			return new Promise((resolve, reject) => {
		        // 1. Opret et usynligt div-element til kortet
		        const tempDiv = document.createElement('div');
		        tempDiv.style.width = '600px';
		        tempDiv.style.height = '400px';
		        tempDiv.style.position = 'absolute';
		        tempDiv.style.top = '-9999px'; // Gem det væk fra skærmen
		        document.body.appendChild(tempDiv);
		
		        // 2. Initialisér et standard Leaflet kort i div'en
		        const tempMap = L.map(tempDiv, {
		            zoomControl: false,
		            attributionControl: false,
		            fadeAnimation: false
		        }).setView([lat, lng], zoom);
		
		        // 3. Brug de præcise OSM fliser, du kender
		        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		            crossOrigin: true
		        }).addTo(tempMap);
		
		        // 4. Tilføj en markør i midten (valgfrit)
		        L.marker([lat, lng]).addTo(tempMap);
		
		        // 5. Vent på at fliserne er indlæst og tag billedet
		        tempMap.whenReady(() => {
		            setTimeout(() => {
		                leafletImage(tempMap, function(err, canvas) {
		                    if (err) {
		                        document.body.removeChild(tempDiv);
		                        reject(err);
		                        return;
		                    }
		                    
		                    // Konvertér canvas til Base64 streng
		                    const base64Data = canvas.toDataURL('image/png');
		                    
		                    // Ryd op
		                    document.body.removeChild(tempDiv);
		                    resolve(base64Data);
		                });
		            }, 500); // En lille buffer for at undgå hvide områder
		        });
		    });
		}

		async function fetchStaticMapDELELETHIS(lat, lng, zoom) {
		    // Erstat med din faktiske API-nøgle fra Stadia Maps eller Mapbox
		    const apiKey = '53e3cd82-c8ef-4d98-afb5-1730d1215ca7';
		    
		    // Vi bruger Stadia Maps "Outdoors" stil, som passer godt til Wildly
		    // Size 600x400 passer godt til de fleste mobilskærme uden at fylde for meget
		    const url = `https://api.stadiamaps.com/static/v1/outdoors.png?center=${lat},${lng}&zoom=${zoom}&size=600,400&api_key=${apiKey}`;
			/*
			https://tiles.stadiamaps.com/static/outdoors.png?center=${lat},${lng}&zoom=${zoom}&size=600x400@2x&api_key=${apiKey}
			https://tiles.stadiamaps.com/static/outdoors.png?center=55.668981874999986,12.517798749999999&zoom=14&size=600x400&api_key=53e3cd82-c8ef-4d98-afb5-1730d1215ca7
		    https://tiles.stadiamaps.com/static/outdoors.png?center=55.668981874999986,12.517798749999999&zoom=14&size=600,400&api_key=53e3cd82-c8ef-4d98-afb5-1730d1215ca7
			*/
			
			https://api.stadiamaps.com/static/v1/outdoors.png?center=55.668981874999986,12.517798749999999&zoom=14&size=600,400&api_key=53e3cd82-c8ef-4d98-afb5-1730d1215ca7
		    try {
		        const response = await fetch(url);
		        if (!response.ok) throw new Error('Netværksfejl ved hentning af kort');
		        
		        const blob = await response.blob();
		        
		        // Konvertér billed-blob'en til en Base64-streng (DataURL)
		        return new Promise((resolve, reject) => {
		            const reader = new FileReader();
		            reader.onloadend = () => resolve(reader.result); // Her returneres selve strengen
		            reader.onerror = reject;
		            reader.readAsDataURL(blob);
		        });
		    } catch (error) {
		        console.error("fetchStaticMap fejl:", error);
		        throw error;
		    }
		}

		window.handleWizardChoice = function(index) {
		    // 1. Tjek at valget er gyldigt
		    if (currentWizardNode && currentWizardNode.choices && currentWizardNode.choices[index]) {
		        
		        // 2. Find det næste trin i træet
		        const nextNode = currentWizardNode.choices[index];
		        
		        // 3. Opdater den globale variabel
		        currentWizardNode = nextNode;
		        
		        // 4. VIGTIGT: Brug navigate() i stedet for renderWizard()
		        // Dette gemmer trinnet i historikken, så "Tilbage" virker
		        navigate('wizard', nextNode);
		    }
		};
		
        function renderWizard(node) {
			// SIKRER AT GLOBALE VARIABLE ER SYNKRONISERET
		    if (typeof node === 'object') {
		        currentWizardNode = node;
		    }
			let content = '';

			//Template for Option List
            const wrap = (title, desc, options) => `
                <div class="fade-in space-y-6 text-center">
                    <h2 class="text-2xl font-black italic sans text-stone-900">${title}</h2>
                    <p class="text-stone-600 italic px-4 font-medium">${desc}</p>
                    <div class="grid grid-cols-1 gap-3">${options}</div>
                    <button onclick="navigate('start')" class="mt-4 text-[10px] uppercase font-bold text-stone-600 tracking-widest">${ui.abort}</button>
                </div>`;

			//Template for Option
            const btn = (index, text, text_more) => `
                <button onclick="handleWizardChoice(${index})" class="p-6 card bg-white border border-stone-100 shadow-sm flex flex-col items-start btn-active group">
                    <span class="font-bold sans text-stone-800 text-sm text-left">${text}</span>
                     ${text_more ? `<span class="sans text-stone-600 italic text-sm text-left">${text_more}</span>` : ''}					 
                </button>`;

			// Template for Warnings (Dead ends)
			const renderWarning = (text) => `
				<div class="fade-in p-8 bg-red-50 border-4 border-red-700 rounded-[32px] text-center space-y-6 shadow-xl">
					<div class="text-6xl">⚠️</div>
					<h3 class="text-3xl font-black text-red-700 uppercase sans tracking-tighter">${ui.warning}</h3>
					<p class="font-bold text-red-900 text-lg leading-relaxed">${text}</p>
					<button onclick="navigate('start')" class="w-full p-5 bg-red-700 hover:bg-red-800 text-white rounded-2xl font-bold mt-4 sans uppercase tracking-widest transition-colors shadow-lg">${ui.close}</button>
				</div>`;

			// Template for Notices (Dead ends)
			const renderNotice = (text) => `
				<div class="fade-in p-8 bg-amber-50 border-4 border-amber-700 rounded-[32px] text-center space-y-6 shadow-xl">
					<div class="text-6xl">✋</div>
					<h3 class="text-3xl font-black text-amber-700 uppercase sans tracking-tighter">${ui.notice}</h3>
					<p class="font-bold text-amber-900 text-lg leading-relaxed">${text}</p>
					<button onclick="navigate('start')" class="w-full p-5 bg-amber-700 hover:bg-amber-800 text-white rounded-2xl font-bold mt-4 sans uppercase tracking-widest transition-colors shadow-lg">${ui.understood}</button>
				</div>`;
		
			if (!node || node === 'START') {
				content = wrap(`${ui.wizard}`, `${ui.wizard_observe}`, `
					<button onclick="navigate('wizard', 'STOP_POISON')" class="p-5 card bg-red-700 text-white font-black sans uppercase btn-active">${ui.wizard_observe_yes}</button>
					<button onclick="navigate('wizard', 'PROCEED')" class="p-5 card bg-green-700 text-white font-black sans uppercase btn-active">${ui.wizard_observe_no}</button>
				`); 

				document.getElementById('app-content').innerHTML = content;
				window.scrollTo(0,0);
				return;
			}
			else if (node === 'STOP_POISON') {
				content = `<div class="fade-in p-8 bg-red-50 border-4 border-red-700 rounded-[32px] text-center space-y-4"><h3 class="text-3xl font-black text-red-700 uppercase sans">${ui.wizard_stop}</h3><p class="font-bold text-red-900 italic">${ui.wizard_stop_description}</p><button onclick="navigate('start')" class="w-full p-4 bg-red-700 text-white rounded-2xl font-bold mt-4 sans uppercase">${ui.abort}</button></div>`; 

				document.getElementById('app-content').innerHTML = content;
				window.scrollTo(0,0);
				return;
			}
			else if (node === 'PROCEED') {
				currentWizardNode = wizardMushroomData;
				node = currentWizardNode;
			}
			
			if (node.warning) {
				// CASE: Warning / Dead End
				content = renderWarning(node.warning);
			}
			else if (node.notice) {
				// CASE: Notification / Dead End
				content = renderNotice(node.notice);
			} 
			else if (node.id) {
				// CASE: Identification Successful
				navigate(node.id);
				return;
			} 
			else if (node.choices) {
				// Generate HTML for all buttons based on the 'match' property
				const optionsHtml = node.choices.map((choice, index) => {
					return btn(index, choice.match, choice.text_more);
				}).join('');

				// Use node.prompt for title, and node.description for instructions
				content = wrap(
					node.prompt || `${ui.wizard_please_choose}:`, 
					node.description || "", 
					optionsHtml
				);
			} 
			else {
				// Fallback
				content = `<div class="text-center py-10"><p>${ui.wizard_error}</p><button onclick="navigate('start')">${ui.wizard_restart}</button></div>`;
			}
            document.getElementById('app-content').innerHTML = content;
            window.scrollTo(0,0);
        }
		
        function navigate(pageId, data = null) {
			closeMenuIfOpen();
			
		    // Gemmer tilstanden i browserens historik
		    window.history.pushState({ pageId: pageId, data: data }, "", "");
		    render(pageId, data);
		}
		function goBack() {
		    window.history.back();
		}

		async function getGuessedLocation() {
		    try {
		        const response = await fetch('https://ipapi.co/json/');
		        const data = await response.json();
		        
		        return {
		            lang: data.languages.split(',')[0].split('-')[0], 
		            country: data.country_code
		        };
		    } catch (e) {
		        return null; // Fallback hvis tjenesten er nede
		    }
		}

		async function initApp() {
			try {
				// 1. Hent konfigurationen
				const [configRes, geoRes] = await Promise.all([
				        fetch('config.json'),
				        fetch('geo_data.json')
				    ]);
				appConfig = await configRes.json();
			    geoData = await geoRes.json();
				
				// 2. Tjek om vi har gemte indstillinger, ellers start "Gæt-processen"
				const saved = localStorage.getItem('userSettings');
				if (saved) {
					userSettings = JSON.parse(saved);
				} else {
					// Gæt sprog fra browser
					const urlLang = new URLSearchParams(window.location.search).get('lang');
					const geo = await getGuessedLocation();
					let finalLang = urlLang || (geo ? geo.lang : null) || navigator.language.split('-')[0];
					
					// Hvis browser-sproget ikke findes i vores config, brug 'da' som fallback
					if (!appConfig.languages[finalLang]) {
						finalLang = 'da';
					}
		
					// Find standard-landet for det gættede sprog
					const langData = appConfig.languages[finalLang];
					const countryCode = langData.defaultCountry;
		
					userSettings = {
						lang: finalLang,
						country: countryCode,
						region: geoData[countryCode].regions[0] // Tag første region som default
					};
					
					saveSettings(); // Gem de gættede indstillinger
				}
				
				renderLanguageOptions();
				await handleLangChange(userSettings.lang, false); // false = genindlæs ikke hele siden endnu		
			} catch (err) {
				console.error("Fejl under opstart:", err);
			}

			// Erstat den nuværende "tomme" state med startsiden
		    window.history.replaceState({ pageId: 'start' }, "", "");
		    render('start');
		}
		
		window.onpopstate = function(event) {
			const editor = document.getElementById('location-editor');
		    if (editor) {
		        closeLocationEditor(false);
		        return;
		    }
			
			if (event.state) {
		        render(event.state.pageId, event.state.data);
		    } else {
		        // Fallback hvis historikken er tom
		        render('start');
		    }
		};

		document.addEventListener('DOMContentLoaded', () => {
			// Registrer Service Worker til offline brug
		    if ('serviceWorker' in navigator) {
		        window.addEventListener('load', () => {
		            navigator.serviceWorker.register('./sw.js')
		                .then((registration) => {
		                    console.log('ServiceWorker registrering succesfuld med scope: ', registration.scope);
		                })
		                .catch((error) => {
		                    console.log('ServiceWorker registrering fejlede: ', error);
		                });
		        });
		    }
			initApp();
			syncMissingMaps();
		});
    </script>
</body>
</html>
