    <style>
        :root { --ios-bg: #fdfcfb; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: "Georgia", serif; 
            background-color: var(--ios-bg);
            color: #1c1c1e;
            user-select: none;
        }
        .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn-active:active { transform: scale(0.97); opacity: 0.9; }
        .card { background: white; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .type-badge { font-family: sans-serif; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 12px; }
        .badge-mushroom { background: #fef3c7; color: #92400e; }
        .badge-berry { background: #fee2e2; color: #991b1b; }
        .badge-plant { background: #dcfce7; color: #166534; }
        .badge-nut { background: #f3f4f6; color: #374151; }
        
        .id-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #064e3b; margin-bottom: 2px; font-family: sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        .season-trigger {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .season-select-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        /* Season Bar specific styles */
        .month-pill {
            flex: 1;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 900;
            font-family: sans-serif;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .month-active {
            background-color: #064e3b;
            color: white;
            box-shadow: 0 2px 4px rgba(6, 78, 59, 0.2);
        }
        .month-inactive {
            background-color: #f1f1f1;
            color: #626262;
        }

		/* Galleri */
	    /* Skjul scrollbar i galleriet */
	    .no-scrollbar::-webkit-scrollbar {
	        display: none;
	    }
	    .no-scrollbar {
	        -ms-overflow-style: none;
	        scrollbar-width: none;
	    }
	    
	    /* Gør swipe mere responsiv på iOS */
	    #swipe-gallery {
	        -webkit-overflow-scrolling: touch;
	    }

		.fab-container {
		    position: fixed;
		    bottom: 90px;
		    left: 0;
		    right: 0;
		    display: flex;
		    justify-content: center;
		    z-index: 100;
		    pointer-events: none; 
		}

		body.editor-open nav.fixed.bottom-0 {
		    display: none;
		}

		/* Save spot button */
		.floating-save-btn {
		    pointer-events: auto;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    gap: 8px;
		    padding: 12px 20px;
		    background-color: #064e3b;
		    color: white;
		    border-radius: 9999px;
		    border: 2px solid white;
		    font-weight: bold;
		    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		    font-size: 14px;
		    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
		    animation: fab-pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		    transition: transform 0.1s ease;
		}
				
		@keyframes pop-in {
		    0% { transform: scale(0) rotate(-45deg); opacity: 0; }
		    100% { transform: scale(1) rotate(0); opacity: 1; }
		}
		
		/* GPS boble */

		@keyframes radar-pulse {
	        0% { transform: scale(1); opacity: 0.8; }
	        100% { transform: scale(2.5); opacity: 0; }
	    }
	
	    .animate-radar-pulse {
	        animation: radar-pulse 2s cubic-bezier(0, 0, 0.2, 1) infinite;
	    }
				
		.gps-ok-signal { background-color: #fff7ed !important; border: 1px solid #fdba74 !important;}
		.gps-ok-signal .gps-text { color: #9a3412 !important; } /* orange-900 */
		.gps-ok-signal .gps-ping { background-color: rgba(249, 115, 22, 0.3) !important; }
		.gps-poor-signal { background-color: #fee2e2 !important; border: 1px solid #fca5a5 !important; }
		.gps-poor-signal .gps-text { color: #991b1b !important; }
		.gps-poor-signal .gps-ping { background-color: rgba(239, 68, 68, 0.4) !important; }

		.map-offline-placeholder {
		    background-color: #e5e7eb;
		    background-image: radial-gradient(#d1d5db 1px, transparent 1px);
		    background-size: 20px 20px;
		    display: flex;
		    flex-direction: column;
		    align-items: center;
		    justify-content: center;
		    text-align: center;
		    color: #9ca3af;
		}

		.leaflet-top, .leaflet-bottom {
		    z-index: 400 !important;
		}
		
		#prepare-map, #radar-map {
		    z-index: 1; /* Laveste niveau */
		}
		
		/* Radar */
		
		#radar-user-marker {
		    /* Gør bevægelsen af prikken glidende når GPS opdaterer */
		    transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1), top 0.8s cubic-bezier(0.4, 0, 0.2, 1);
		}
		
		#radar-user-arrow {
		    /* Gør rotationen af kompasset lynhurtig men jævn */
		    transition: transform 0.1s linear;
		}
		
		@keyframes pulse-emerald {
		    0% { transform: scale(1); opacity: 0.5; }
		    100% { transform: scale(2.5); opacity: 0; }
		}
		
		.animate-radar-pulse {
		    animation: pulse-emerald 2s infinite;
		}
		
    </style>
</head>

    <script>
		//GLOBALS
		let ui = {};
		let map = null;
		let activeMarkers = {};
		let currentPageId = 'start';
		let currentWizardNode = {};
		let wizardMushroomData = {};
		let isLoggedIn = false;
		let userSettings = JSON.parse(localStorage.getItem('userSettings')) || {
		    lang: 'da',
		    country: 'DK',
		    region: 'Hele landet'
		};
        let activeSeason = 'all';
		let appConfig = {};
		let geoData = {};
		let database = {};
		let locationEditorWatchId = null; 
		let isRadarRunning = false;
		let radarWatchId = null;
		let radarMapDetail = null;
		let radarMapOverview = null;
		let prepareMap = null;
		let prepareLayer = null;
		let downloadAreaMarker;
		let currentEditorAccuracy = 0;
		window.DEBUG_FORCE_OFFLINE = false;
		function isAppOnline() {
		    if (window.DEBUG_FORCE_OFFLINE) {
		        return false; // Vi simulerer at nettet er nede
		    }
		    return navigator.onLine; // Normal opførsel
		}
		let tapTimer = null;
		let tapCount = 0;
		function setupSecretOfflineToggle() {
		    const secretBtn = document.getElementById('secret-offline-button') || document.body; 
		
		    secretBtn.addEventListener('click', () => {
		        tapCount++;
		        
		        clearTimeout(tapTimer);
		        tapTimer = setTimeout(() => { tapCount = 0; }, 1000); // Nulstil hvis der går for lang tid
		
		        if (tapCount >= 5) {
		            tapCount = 0;
		            toggleOfflineSimulation();
		        }
		    });
		}
		function toggleOfflineSimulation() {
		    window.DEBUG_FORCE_OFFLINE = !window.DEBUG_FORCE_OFFLINE;
		    
		    // Vi narrer resten af appen ved at affyre de rigtige browser-events!
		    const eventName = window.DEBUG_FORCE_OFFLINE ? 'offline' : 'online';
		    window.dispatchEvent(new Event(eventName));
		
		    // Vis en lille besked til dig selv, så du ved det virker
		    alert(`📡 Developer-mode: App simulates ${window.DEBUG_FORCE_OFFLINE ? '🔴 OFFLINE' : '🟢 ONLINE'}`);
		}		
		document.addEventListener('DOMContentLoaded', setupSecretOfflineToggle);
		
		
		delete L.Icon.Default.prototype._getIconUrl;
		L.Icon.Default.mergeOptions({
		    iconRetinaUrl: 'lib/leaflet/images/marker-icon-2x.png',
		    iconUrl: 'lib/leaflet/images/marker-icon.png',
		    shadowUrl: 'lib/leaflet/images/marker-shadow.png',
		    iconSize: [25, 41],
		    iconAnchor: [12, 41], // Fixer "Syd"-forskydningen globalt
		    shadowSize: [41, 41]
		});
		
		const photoStorage = {
		    dbName: "WildlyDB",
		    storeName: "photos",
				
		    // Gem et billede til et specifikt fund
		    async add(spotUid, base64Data) {
				const db = await getDB();
		        return new Promise((resolve, reject) => {
		            const tx = db.transaction(this.storeName, "readwrite");
		            const store = tx.objectStore(this.storeName);
		            const request = store.add({ spotUid, data: base64Data, date: Date.now() });
		            request.onsuccess = () => resolve();
		            request.onerror = () => reject();
		        });
		    },
		
		    // Hent alle billeder til et specifikt fund
		    async getAll(spotUid) {
				const db = await getDB();
		        return new Promise((resolve) => {
		            const tx = db.transaction(this.storeName, "readonly");
		            const store = tx.objectStore(this.storeName);
		            const index = store.index("spotUid");
		            const request = index.getAll(spotUid);
		            request.onsuccess = () => resolve(request.result);
		        });
		    },
		
		    // Slet et specifikt billede
		    async delete(photoId) {
				const db = await getDB();
		        const tx = db.transaction(this.storeName, "readwrite");
		        tx.objectStore(this.storeName).delete(photoId);
		    }
		};
		
		const mapStorage = {
		    dbName: "WildlyDB",
		    storeName: "maps", // En separat skuffe til kort		
		    // Gem kort (type er enten 'overview', 'detail' eller 'offline17')
		    async save(spotUid, type, base64Data) {
				const db = await getDB();
		        return new Promise((resolve, reject) => {
		            const tx = db.transaction(this.storeName, "readwrite");
		            const store = tx.objectStore(this.storeName);
		            // Vi gemmer med en nøgle som "overview_abc-123"
		            const request = store.put(base64Data, `${type}_${spotUid}`);
		            request.onsuccess = () => resolve();
		            request.onerror = () => reject();
		        });
		    },
		
		    // Hent kort
		    async get(spotUid, type) {
				const db = await getDB();
		        return new Promise((resolve) => {
		            const tx = db.transaction(this.storeName, "readonly");
		            const store = tx.objectStore(this.storeName);
		            const request = store.get(`${type}_${spotUid}`);
		            request.onsuccess = () => resolve(request.result);
		        });
		    },
			
			async delete(spotUid) {
				const db = await getDB();
			    const tx = db.transaction(this.storeName, "readwrite");
			    const store = tx.objectStore(this.storeName);
			
			    // Slet begge billedtyper tilknyttet dette spot
			    store.delete(`overview_${spotUid}`);
			    store.delete(`detail_${spotUid}`);
			    store.delete(`offline17_${spotUid}`);
			
			    return new Promise((resolve, reject) => {
			        tx.oncomplete = () => {
			            resolve();
			        };
			        tx.onerror = (e) => {
			            console.error("Error deleting offline map data:", e.target.error);
			            reject(e.target.error);
			        };
			    });
			}
		};

		function getDB() {
		    return new Promise((resolve, reject) => {
		        const request = indexedDB.open("WildlyDB", 2);
		        request.onupgradeneeded = (e) => {
		            const db = e.target.result;
		            
		            if (!db.objectStoreNames.contains("photos")) {
		                const photoStore = db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
		                photoStore.createIndex("spotUid", "spotUid", { unique: false });
		            }
		            
		            if (!db.objectStoreNames.contains("maps")) {
		                db.createObjectStore("maps");
		            }
		        };
		
		        request.onsuccess = () => resolve(request.result);
		        request.onerror = (e) => reject(e.target.error);
		    });
		}

		// Hjælpefunktion til at flette (merge) objekter dybt sammen
		function deepMerge(target, ...sources) {
		    if (!sources.length) return target;
		    const source = sources.shift();
		
		    if (target && typeof target === 'object' && !Array.isArray(target) && 
		        source && typeof source === 'object' && !Array.isArray(source)) {
		        for (const key in source) {
		            if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
		                if (!target[key]) Object.assign(target, { [key]: {} });
		                deepMerge(target[key], source[key]);
		            } else {
		                Object.assign(target, { [key]: source[key] });
		            }
		        }
		    }
		    return deepMerge(target, ...sources);
		}
		
		async function loadDatabase() {
			const lang = userSettings.lang;
			const country = userSettings.country;
			const region = userSettings.region;

			try {
				// 1. Hent de tre nødvendige filer parallelt
				const [uniRes, langRes, regRes] = await Promise.all([
					fetch('data/universal.json'),
					fetch(`data/lang/${lang}.json`),
					fetch(`data/regions/${country}.json`)
				]);
		
				const universal = await uniRes.json();
				const langData = await langRes.json();
				const regionData = await regRes.json();
		
				const flatDatabase = {};
		
				// 2. Loop KUN over de arter, der findes i det valgte land
				for (const id in regionData) {
					const regObj = regionData[id];
					const commonData = regObj.all || {};
					const specificRegionData = regObj[region];
		
					// SIKKERHEDS-TJEK: Vokser den overhovedet her?
					// Hvis der ikke er nogen 'common' data, og den heller ikke er nævnt 
					// i den valgte region, så spring den over.
					if (Object.keys(commonData).length === 0 && !specificRegionData) {
						continue; 
					}
		
					let entry = { id: id };
		
					// A: Start med at hente de universelle grunddata (type, latin)
					if (universal[id]) {
						deepMerge(entry, universal[id]);
					}
		
					// B: Læg de globale sprog-tekster på (navn, traits, id_keys)
					if (langData[id]) {
						deepMerge(entry, langData[id]);
					}
		
					// C: Pålæg Common Base Data for landet (habitats, months osv.)
					let commonBase = { ...commonData };
					delete commonBase.i18n; // Undgå at overskrive med hele i18n objektet
					deepMerge(entry, commonBase);
		
					// D: Pålæg Common Sprog Data for landet (f.eks. dansk extended_habitat)
					if (commonData.i18n && commonData.i18n[lang]) {
						deepMerge(entry, commonData.i18n[lang]);
					}
		
					// E: Hvis brugerens valgte region har unikke data, så overskriv med dem!
					if (specificRegionData) {
						let specificBase = { ...specificRegionData };
						delete specificBase.i18n;
						deepMerge(entry, specificBase); // Kan f.eks. ændre 'months' for Nordjylland
		
						// F: Regionale sprog-variationer (f.eks. lokal forvekslingsfare)
						if (specificRegionData.i18n && specificRegionData.i18n[lang]) {
							deepMerge(entry, specificRegionData.i18n[lang]);
						}
					}
		
					// 3. Tilføj det færdige, skræddersyede objekt til appens database
					flatDatabase[id] = entry;
				}

				database = flatDatabase;
		
			} catch (error) {
				console.error("Could not parse and build database:", error);
				return null;
			}
		}

		function getDistance(lat1, lon1, lat2, lon2) {
		    const R = 6371; // Jordens radius i km
		    const dLat = (lat2 - lat1) * Math.PI / 180;
		    const dLon = (lon2 - lon1) * Math.PI / 180;
		    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
		              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
		    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
		    const d = R * c;
		    return d; // Returnerer afstand i km
		}

		// Funktionen der kører når du trykker på et punkt i listen
		function focusSpotOnMap(originalIndex) {

		        // 1. Scroll ned til kortet
		        const mapEl = document.getElementById('overview-map');
		        if (mapEl) mapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
		
		        const targetZoom = 15;
		
		        // 2. MATEMATIKKEN: Vi beregner et "falskt" centerpunkt
		        // Omdan GPS-koordinater til pixels på skærmen
		        let targetPoint = window.currentMap.project(marker.getLatLng(), targetZoom);
		        
		        // Dette flytter kameraet OP, hvilket betyder at pinden ender længere NEDE på kortet.
		        targetPoint.y -= 120; 
		        
		        // Omdan de nye pixels tilbage til GPS-koordinater
		        const targetLatLng = window.currentMap.unproject(targetPoint, targetZoom);
		
		        // 3. Flyt kortet til det nye "falske" center
		        window.currentMap.setView(targetLatLng, targetZoom, { animate: true });
		
		        // 4. Åbn popup (Vi venter lige et splitsekund så kortet er begyndt at rykke sig)
		        setTimeout(() => {
		            marker.openPopup();
		        }, 300);
		    }
		}

		function centerMapOnStep() {
		    // Vi henter den seneste position fra vores globale editor-variabel
		    // (Vi bruger en variabel der opdateres i startLiveGpsTracking)
		    if (window.lastKnownLocation && map) {
		        map.setView([window.lastKnownLocation.lat, window.lastKnownLocation.lng], 18);
		    }
		}
		
		function startLiveGpsTracking() {
			// Tjek om browseren overhovedet understøtter Geolocation
		    if (!navigator.geolocation) {
		        console.error("Geolocation is not supported by this browser.");
		        return;
		    }
		
		    // Vi bruger watchPosition i stedet for getCurrentPosition, 
		    // så vi får løbende opdateringer mens brugeren bevæger sig.
		    locationEditorWatchId = navigator.geolocation.watchPosition((pos) => {
		        // 1. Gem den aktuelle position i en global variabel.
		        // Denne bruges af "Centrér" knappen og til offline-gemning.
		        window.lastKnownLocation = {
		            lat: pos.coords.latitude,
		            lng: pos.coords.longitude
		        };
		        // 2. Opdater den globale præcision (Accuracy)
		        currentEditorAccuracy = pos.coords.accuracy;
		        // 3. Opdater det visuelle udtryk i GPS-boblen (Farve, størrelse og tekst)
		        updateGpsBobble(currentEditorAccuracy);
		    }, (err) => {
		        // Håndtering af fejl (f.eks. hvis brugeren afviser adgang eller mister signal)
		        const message = document.getElementById('gps-message');
		        if (message) {
		            message.innerText = ui.gps_searching;
		            message.classList.replace('text-emerald-950', 'text-red-700');
		        }
		    }, { 
		        enableHighAccuracy: true, // Tvinger telefonen til at bruge GPS-chippen (ikke bare Wifi)
		        maximumAge: 0,            // Vi vil ikke have gamle (cachede) positioner
		        timeout: 10000            // Giv op efter 10 sekunder hvis intet signal findes
		    });
		}
		
		function updateGpsBobble(accuracy) {
		    const bobble = document.getElementById('gps-bobble');
		    const accuracyLabel = document.getElementById('gps-accuracy');
		    const ping = document.getElementById('gps-ping');
		    const message = document.getElementById('gps-message');
		
		    if (!bobble) return;
		
		    accuracyLabel.innerText = `${Math.round(accuracy)}m`;
		
		    // Skalering af boblen
		    const baseScale = 1 + (1 - (accuracy / 50)); 
		    const finalScale = Math.min(Math.max(baseScale, 0.9), 1.2); 
		    bobble.style.transform = `scale(${finalScale})`;
		
		    // Fjern alle farve-klasser først for at nulstille
		    bobble.classList.remove('gps-poor-signal', 'gps-ok-signal');
		    message.classList.remove('text-red-700', 'text-orange-600', 'text-emerald-950');
		
		    if (accuracy > 24) {
		        // NIVEAU 1: DÅRLIGT (> 30m)
		        bobble.classList.add('gps-poor-signal');
		        ping.style.opacity = "0";
		        message.innerText = ui.gps_poor;
		        message.classList.add('text-red-700');
		    } 
		    else if (accuracy > 8) {
		        // NIVEAU 2: OK / SØGER BEDRE (15m - 30m)
		        bobble.classList.add('gps-ok-signal');
		        ping.style.opacity = "0.5";
		        message.innerText = ui.gps_ok;
		        message.classList.add('text-orange-600');
		    } 
		    else {
		        // NIVEAU 3: PERFEKT (< 15m)
		        // Ingen ekstra klasser (standard er grøn)
		        ping.style.opacity = "1";
		        message.innerText = ui.gps_perfect;
		        message.classList.add('text-emerald-950');
		    }
		}
		
		async function saveFinalLocation(resId) {
		    let spotUid;
		    let finalLat, finalLng;
		    
		    if (map) {
		        // KORTET KØRER (Enten online eller i offline-cache)
		        // Vi tillader at brugeren kan have rykket rundt på skærmen
		        const center = map.getCenter();
		        finalLat = center.lat;
		        finalLng = center.lng;
		    } else if (window.lastKnownLocation) {
		        // INTET KORT (Offline og udenfor cache)
		        // Vi stoler 100% på det rå GPS signal fra boblen
		        finalLat = window.lastKnownLocation.lat;
		        finalLng = window.lastKnownLocation.lng;
		    } else {
		        // Fallback hvis GPS'en slet ikke har returneret noget endnu
		        alert(ui.gps_searching);
		        return;
		    }
		
		    let spots = JSON.parse(localStorage.getItem('mySpots')) || [];
		    
		    if (window.editingSpotUid) {
		        spotUid = window.editingSpotUid;
		        const index = spots.findIndex(s => s.uid === spotUid);
		        if (index !== -1) {
		            spots[index].lat = finalLat;
		            spots[index].lng = finalLng;
					spots[index].hasStaticMaps = false;
					spots[index].hasOfflineMap = false;
		        }
				await mapStorage.delete(spotUid);
				window.editingSpotUid = null; 
		    } else {
		        spotUid = `spot_${crypto.randomUUID()}`;
		        const newDiscovery = { 
		            uid: spotUid,           
		            resId: resId,           
		            lat: finalLat, 
		            lng: finalLng, 
		            acc: currentEditorAccuracy,
		            timestamp: new Date().toISOString(),
		            hasStaticMaps: false,
					hasOfflineMap: false,
		            photos: []              
		        };
		        spots.push(newDiscovery);
		    }
		    
		    localStorage.setItem('mySpots', JSON.stringify(spots));
		    closeLocationEditor();
		    
		    try {
		        const overlay = document.getElementById('loading-overlay');
		        const statusText = document.getElementById('loading-status-text');
		        
		        statusText.innerText = ui.spinner_detail_image;
		        overlay.classList.remove('hidden');
		        
		        await syncMissingMaps(spotUid);
		        
		        setTimeout(() => {
		            overlay.classList.add('hidden');
		            navigate('view_spot', { spotId: spotUid });
		        }, 500);
		        
		    } catch (err) {
		        console.error("Error while retrieving map:", err);
		        navigate('view_spot', { spotId: spotUid });
		    }
		}
		
		function closeLocationEditor(shouldGoBack = true) {
		    // Sluk GPS trackeren så den ikke dræner batteri
			if (locationEditorWatchId !== null) {
		        navigator.geolocation.clearWatch(locationEditorWatchId);
		        locationEditorWatchId = null;
		    }
			
			if (map) {
		        try {
		            map.remove();
		        } catch (e) {
		            console.warn("Kortet kunne ikke fjernes (måske aldrig oprettet)");
		        }
		        map = null;
		    }
			
		    const editor = document.getElementById('location-editor');
			document.body.classList.remove('editor-open');
			if(editor) editor.remove();

			window.editingSpotUid = null;
			window.lastKnownLocation = null;
		
		    // 5. Hvis vi lukkede via krydset (og ikke via tilbage-knappen), 
		    // så skal vi fjerne det ekstra punkt i historikken
		    if (shouldGoBack && window.history.state?.pageId === 'location_editor') {
		        window.history.back();
		    }
		}
		
		// Henter GPS-koordinater med høj præcision
		const getPreciseLocation = () => {
			return new Promise((resolve, reject) => {
				if (!navigator.geolocation) {
					reject(new Error(ui.map_no_gps));
				}
				navigator.geolocation.getCurrentPosition(
					(pos) => resolve({
						lat: pos.coords.latitude,
						lng: pos.coords.longitude,
						acc: Math.round(pos.coords.accuracy),
						timestamp: new Date().toISOString()
					}),
					(err) => reject(err),
					{ enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
				);
			});
		};

					<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
				</svg>`;
			
			btn.style.width = originalWidth + 'px';
    		btn.disabled = true;
		
			try {		
				btn.innerHTML = spinnerSvg;
				
				const location = await getPreciseLocation();
		        
		        // Åbner editoren og sender ID med
		        showLocationEditor(id, location);
			} catch (error) {

		    }
		}

		async function fetchStaticMap(lat, lng, zoom) {
		    return new Promise((resolve, reject) => {
		        // 1. Opret containeren (skjult for brugeren, men synlig for browseren)
		        const tempDiv = document.createElement('div');
				tempDiv.style.width = '400px';
		        tempDiv.style.height = '400px';
				tempDiv.style.position = 'fixed'; // Fixed så den ikke påvirker scroll
		        tempDiv.style.left = '-5000px';   // Flyt den langt uden for skærmen
		        tempDiv.style.top = '0';
		        tempDiv.style.opacity = '0';      // Gør den gennemsigtig
		        tempDiv.style.pointerEvents = 'none'; // Sørg for at man ikke kan klikke på den
		        tempDiv.style.zIndex = '-9999';
				document.body.appendChild(tempDiv);
		
		        // 2. Initialiser kortet uden animationer (vigtigt for screenshots)
		        let tempMap = L.map(tempDiv, {
		            zoomControl: false,
		            attributionControl: false,
		            fadeAnimation: false,
		            zoomAnimation: false,
					preferCanvas: true,
		            markerZoomAnimation: false
		        }).setView([lat, lng], zoom);
				
		        // 3. Konfigurer flise-laget
				let tileLayer = L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
				    useCache: true,
				    crossOrigin: 'anonymous',
				    cacheName: 'wildly-prepare-trip-cache',
				    useOnlyCache: !isAppOnline(),
				    keepBuffer: 99,
				    updateWhenIdle: false,
					timeout: 5000
				}).addTo(tempMap);	

		        // 4. Tilføj markøren (bruger det rettede ankerpunkt via global CSS/Icon def)
		        L.marker([lat, lng]).addTo(tempMap);
						
				function cleanup() {
				    if (tempMap) {
				        try {
				            tempMap.off();
				            tempMap.remove();
				            tempMap = null;
				        } catch (e) {
				            console.warn("Leaflet cleanup warning:", e);
				        }
				    }
				
				    if (tempDiv && tempDiv.parentNode) {
				        try {
				            tempDiv.parentNode.removeChild(tempDiv);
				        } catch (e) {
				            console.warn("DOM cleanup warning:", e);
				        }
				    }
				}
				
				// Vi venter på 'load' eventet fra tileLayer
		        tileLayer.on('load', () => {
		            // Lille delay for at sikre, at canvas-atomet er opdateret
		            setTimeout(() => {
		                tempMap.invalidateSize({ animate: false });
		                
		                leafletImage(tempMap, function(err, canvas) {
		                    if (err) {
		                        cleanup();
		                        reject(err);
		                        return;
		                    }
		                    
		                    try {
		                        cleanup();
		                        resolve(dataUrl);
		                    } catch (e) {
		                        cleanup();
		                        reject(e);
		                    }
		                });
		            }, 1200);
		        });
						
		        setTimeout(() => {
		            cleanup();
		            reject(new Error("Timeout during map generation"));
		        }, 8000);
		    });
		}
		
		async function syncMissingMaps(targetUid = null) {
		    if (!userSettings.isPremium) return;
		
		    let allSpots = JSON.parse(localStorage.getItem('mySpots')) || [];
			let pendingSpots = allSpots.filter(spot => {
		        const needsStatic = !spot.hasStaticMaps;
		        const needsOffline = !spot.hasOfflineMap;
		        
		        if (targetUid) return spot.uid === targetUid && (needsStatic || needsOffline);
		        return (needsStatic || needsOffline);
		    });
		
		    if (pendingSpots.length === 0) return;
		
		    let hasChanges = false;
		
		    for (let spot of pendingSpots) {
		        const canGenerateOffline = isLocationInOfflineCache(spot.lat, spot.lng);
				const originalSpot = allSpots.find(s => s.uid === spot.uid);
		        if (!originalSpot) continue;
				
				try {
					if (isAppOnline() && !originalSpot.hasStaticMaps) {
						// ONLINE: Hent den fulde radar-pakke (15, 17 og 18)
						const overviewBase64 = await fetchStaticMap(spot.lat, spot.lng, 15);
						const img17 = await fetchStaticMap(spot.lat, spot.lng, 17); 
						const detailBase64 = await fetchStaticMap(spot.lat, spot.lng, 18); 
						await mapStorage.save(spot.uid, 'overview', overviewBase64);
						await mapStorage.save(spot.uid, 'offline17', img17);
						await mapStorage.save(spot.uid, 'detail', detailBase64);
						
						originalSpot.hasStaticMaps = true;
						hasChanges = true;
					}
					
					if (!originalSpot.hasStaticMaps && canGenerateOffline && !originalSpot.hasOfflineMap && !originalSpot.hasStaticMaps) {
						const img17 = await fetchStaticMap(spot.lat, spot.lng, 17);
						if (img17) {
							await mapStorage.save(spot.uid, 'offline17', img17);
							originalSpot.hasOfflineMap = true;
							hasChanges = true;
						}
					}
				} catch (e) {
					console.error("Error fetching data for spot:", spot.uid, e);
				}
		    }
		
		    if (hasChanges) {
		        localStorage.setItem('mySpots', JSON.stringify(allSpots));
		    }
		}

		function canUseRadar() {
		    // 1. Tjek om Geolocation findes
		    const hasGPS = 'geolocation' in navigator;
		    
		    // 2. Tjek om enheden kan måle orientering (kompas)
		    // De fleste moderne browsere har DeviceOrientationEvent, 
		    // men vi tjekker også om det er en mobil enhed
		    const hasCompass = 'DeviceOrientationEvent' in window;
		    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
		
		    return hasGPS && (hasCompass || isMobile);
		}
		
		function calculateBearing(lat1, lon1, lat2, lon2) {
		    const toRad = (v) => v * Math.PI / 180;
		    const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
		    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
		              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
		    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
		}

		async function requestCompassPermission(spot) {

		    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {

		}
		
		// Hjælpefunktion: Glidende overgang for almindelige tal (X og Y)
		function lerp(start, end, factor) {
		    return start + (end - start) * factor;
		}
		
		// Hjælpefunktion: Glidende overgang for vinkler (håndterer springet ved 0/360 grader)
		function lerpAngle(start, end, factor) {
		    let delta = ((((end - start) % 360) + 540) % 360) - 180;
		    return start + (delta * factor);
		}
		
		async function startRadarLogic(spot) {
		    const marker = document.getElementById('radar-user-marker');
		    const arrow = document.getElementById('radar-user-arrow');
		    const distLabel = document.getElementById('radar-distance');
		    const mapImg = document.getElementById('radar-map-img');
		    const instruction = document.getElementById('radar-instruction');
		
		    instruction.innerText = ui.radar_fetching_map;
		
		    // 1. Forsøg at synkronisere/hente manglende kort (hvis online)
			if (isAppOnline()) {
			    await syncMissingMaps(spot.uid);
			}
				
		    // 2. Hent korttyperne fra din storage
		    const mapDetail = await mapStorage.get(spot.uid, 'detail'); 
		    const mapOverview = await mapStorage.get(spot.uid, 'overview');
		    const mapMiddle = await mapStorage.get(spot.uid, 'offline17');
		
		    // Tjek hvilken "mode" vi kører i
		    const hasFullSet = mapDetail && mapOverview;
		    const hasOfflineFallback = !!mapMiddle;
		
		    if (!hasFullSet && !hasOfflineFallback) {
		        instruction.innerText = ui.radar_not_available_offline;
		    } else {
		        instruction.innerText = ui.radar_waiting_for_gps;
		    }
		
		    // --- JITTER FILTER SETUP (SMOOTHING) ---
			isRadarRunning = true;
		    let currentX = 0, targetX = 0;
		    let currentY = 0, targetY = 0;
		    let currentHeading = 0, targetHeading = 0;
		    let firstGps = true;
		    let firstCompass = true;
			let currentActiveMapRange = null;
					
		    function animateRadar() {
		        if (!isRadarRunning) return;
		
		        const smoothFactor = 0.08;
		
		        currentHeading = lerpAngle(currentHeading, targetHeading, smoothFactor);
		        arrow.style.transform = `rotate(${currentHeading}deg)`;
		
		        currentX = lerp(currentX, targetX, smoothFactor);
		        currentY = lerp(currentY, targetY, smoothFactor);
		        marker.style.left = `calc(50% + ${currentX}px)`;
		        marker.style.top = `calc(50% + ${currentY}px)`;
		
		        requestAnimationFrame(animateRadar);
		    }
		    requestAnimationFrame(animateRadar);
		
		    // --- KOMPAS / ORIENTERING ---
		    if (window.DeviceOrientationEvent) {
		        const handleOrientation = (e) => {
		            let heading = 0;
		            if (e.webkitCompassHeading !== undefined) {
		                heading = e.webkitCompassHeading;
		            } else if (e.alpha !== null) {
		                heading = 360 - e.alpha;
		            }
		            targetHeading = heading;
		            if (firstCompass) {
		                currentHeading = targetHeading;
		                firstCompass = false;
		            }
		        };
				window.addEventListener('deviceorientation', handleOrientation, true);
		        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
		    }
		
		    // --- GPS LOGIK ---
		    radarWatchId = navigator.geolocation.watchPosition((pos) => {
		        const userLat = pos.coords.latitude;
		        const userLng = pos.coords.longitude;
		
		        const dist = getDistance(userLat, userLng, spot.lat, spot.lng);
		        const bearing = calculateBearing(userLat, userLng, spot.lat, spot.lng);
		
		        // --- BEREGN RANGES (AFSTANDE PÅ KORTET) ---
				const metersPerPxZ15 = (156543.03 * Math.cos(spot.lat * (Math.PI / 180))) / 32768; // 32768 er konstanten for Zoom 15
				const range15 = (metersPerPxZ15 * 200) / 1000; // Den visuelle rækkevidde for det nye kort
				const range18 = range15 / 8;                  // Zoom 18 er 8x tættere på
		        const range17 = range15 / 4;                  // Zoom 17 er 4x tættere på
		
		        distLabel.innerText = dist < 1 ? Math.round(dist * 1000) + ' m' : dist.toFixed(1) + ' km';
		
		        let maxVisualRange;
				let mapChangedThisTick = false;
				
		        // --- KORT-VALG LOGIK ---
		        if (hasFullSet) {
		            // Standard mode: Skift mellem 16 og 18
		            if (dist < range18) {
						if (!mapImg.src.includes(mapDetail)) {
		                    mapImg.src = mapDetail;
		                    mapChangedThisTick = true;
		                }
		                instruction.innerText = ui.radar_close;
		                maxVisualRange = range18;
					} else if (dist < range17) {
					    if (!mapImg.src.includes(mapMiddle)) {
		                    mapImg.src = mapMiddle;
		                    mapChangedThisTick = true;
		                }
					    instruction.innerText = ui.radar_close;
					    maxVisualRange = range17;
					} else {
			                if (!mapImg.src.includes(mapOverview)) {
			                    mapImg.src = mapOverview;
			                    mapChangedThisTick = true;
			                }
			                instruction.innerText = ui.radar_walk_towards_middle;
			                maxVisualRange = range15;
		            }
		        } else if (hasOfflineFallback) {
		            // Offline mode: Brug kun Zoom 17
					if (!mapImg.src.includes(mapMiddle)) {
						mapImg.src = mapMiddle;
						mapChangedThisTick = true;
					}
		            instruction.innerText = dist <= range17 ? ui.radar_close : ui.radar_walk_towards_middle;
		            maxVisualRange = range17;					
				}
		
		        // --- POSITIONERING PÅ RADAR-CIRKLEN ---
		        const radarRadius = 144; // Pixels fra midten til kanten af radaren
				let visualDist;
				
				if (dist > maxVisualRange) {
				    // BRUGER ER UDEN FOR KORTET:
				    // Placer pilen ude på en "bane" uden for selve kortet
				    visualDist = radarRadius + 16;
				} else {
				    // BRUGER ER INDE PÅ KORTET:
				    // Beregn normal placering relativt til centrum
				    visualDist = (dist / maxVisualRange) * radarRadius;
				    
				    // Sikr at den ikke rammer helt ud i den hvide ramme, når de lige akkurat er inde
				    if (visualDist > radarRadius - 15) visualDist = radarRadius - 15;
				}

		        targetX = -Math.sin(bearing * (Math.PI / 180)) * visualDist;
		        targetY = Math.cos(bearing * (Math.PI / 180)) * visualDist;
		
		        if (firstGps || mapChangedThisTick) {
		            currentX = targetX;
		            currentY = targetY;
		            firstGps = false;
					mapChangedThisTick = false;
		        }
		
		    }, (err) => {
		        instruction.innerText = ui.radar_gps_signal_lost;
		    }, { enableHighAccuracy: true });
		}
		
		function renderRadar(spot) {
		    const container = document.getElementById('app-content');
		    
		    container.innerHTML = `

					<div class="relative w-72 h-72" id="radar-wrapper">

					        <img id="radar-map-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-80 transition-opacity duration-500">

					            <div class="relative">
					                <div class="absolute -inset-2 bg-emerald-500/20 animate-ping rounded-full"></div>
					            </div>

		function isLocationInOfflineCache(lat, lng) {
		    if (isAppOnline()) return true;
		    
		    const boundsRaw = localStorage.getItem('wildly_offline_bounds');
		    if (!boundsRaw) return false;
		    
		    try {
		        const b = JSON.parse(boundsRaw);
		        // Tjek om koordinaten ligger indenfor den gemte firkant
		        return (lat <= b.north && lat >= b.south && lng <= b.east && lng >= b.west);

		function updateDownloadArea() {
		    if (!prepareMap) return;
		    
		    const center = prepareMap.getCenter();
		    const mapSize = prepareMap.getSize(); 
		    const currentZoom = prepareMap.getZoom(); // Find ud af hvor brugeren er nu
		    const downloadAreaZoom = 14; // Det område vi ønsker at dække (Zoom 14)
		
		    // 1. Find ud af hvor mange pixels skærmen svarer til i "download-skalaen" (Zoom 14)
			const scaleFactor = Math.pow(2, currentZoom - downloadAreaZoom);
			
		    const targetWidth = mapSize.x * scaleFactor;
		    const targetHeight = mapSize.y * scaleFactor;
		
		    // 2. Beregn bounds i nuværende zoom-skala, så firkanten skalerer med kortet
		    const centerPoint = prepareMap.project(center, currentZoom);
		    const swPoint = centerPoint.subtract([targetWidth / 2, targetHeight / 2]);
		    const nePoint = centerPoint.add([targetWidth / 2, targetHeight / 2]);
		    
		    const bounds = L.latLngBounds(
		        prepareMap.unproject(swPoint, currentZoom),
		        prepareMap.unproject(nePoint, currentZoom)
		    );
		    
		    // 3. Tegn eller opdater firkanten
		    if (!downloadAreaMarker) {
		        downloadAreaMarker = L.rectangle(bounds, {
		            color: "#10b981",
		            weight: 2,
		            fillOpacity: 0.1,
		            dashArray: "5, 10",
		            interactive: false
		        }).addTo(prepareMap);
		    } else {
		        downloadAreaMarker.setBounds(bounds);
		    }
		    
		    return bounds;
		}

			    let startLat = geoData[userSettings.country].startLat;

			    let hasSetView = false;
			
			    // 2. Tjek om der findes et gemt offline-område
			    const savedBoundsRaw = localStorage.getItem('wildly_offline_bounds');
			    if (savedBoundsRaw) {
			        try {
			            const b = JSON.parse(savedBoundsRaw);
			            // Vi sætter centeret til midten af det gemte område
			            startLat = (b.north + b.south) / 2;
			            startLng = (b.east + b.west) / 2;
			            hasSetView = true;
			        } catch (e) {
			            console.error("Could not read saved bounds", e);
			        }
			    }
			
			    // 3. Hvis intet kort er gemt, prøv GPS
			    if (!hasSetView && navigator.geolocation) {
			        navigator.geolocation.getCurrentPosition((position) => {

			}, 50);

		async function clearOfflineMapCache() {
		    try {
		        // 1. Fjern laget fra kortet midlertidigt for at undgå læse/skrive-konflikter
		        if (prepareLayer && prepareMap) {
		            prepareMap.removeLayer(prepareLayer);
		        }
		
		        // 2. Slet hele PouchDB databasen (navnet SKAL matche det du brugte i cacheName)
		        const db = new PouchDB('wildly-prepare-trip-cache');
		        await db.destroy();
		
		        // 3. Opret laget på ny, så det er klar til det nye download
		        prepareLayer = L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
					useCache: !!userSettings.isPremium,
					crossOrigin: 'anonymous',
					cacheName: 'wildly-prepare-trip-cache',
					useOnlyCache: !isAppOnline()
				});
				
		    } catch (err) {
		        console.error("Could not clear cache:", err);
		    }
		}
		
		async function startAreaDownload() {
		    try {
		        // 1. Beregn området baseret på zoom 14 (uanset hvad brugeren ser)
		        const bounds = updateDownloadArea();
		        const overlay = document.getElementById('offline-download-overlay');
		        const progressBar = document.getElementById('download-progress-bar');
		        const progressText = document.getElementById('download-progress-text');
				const percent = 0;
		
		        overlay.classList.remove('hidden');
		        progressBar.style.width = '0%';
		        progressText.innerText = '0%';
		
		        // 2. Progress-lytter med korrekt matematik
		        prepareLayer.on('seedprogress', function(seedData) {
					const downloaded = seedData.downloaded || 0;
			        const remaining = seedData.remaining || 0;
			        const total = downloaded + remaining;

					if (total > 0) {
			            percent = Math.floor((downloaded / total) * 100);
			        }
					
		            progressBar.style.width = percent + '%';
		            progressText.innerText = percent + '%';
		        });
		
		        prepareLayer.on('seedend', function() {
		            // Gem de faktiske grænser for det downloadede område
		            const cacheBounds = {
		                north: bounds.getNorth(),
		                south: bounds.getSouth(),
		                east: bounds.getEast(),
		                west: bounds.getWest()
		            };
		            localStorage.setItem('wildly_offline_bounds', JSON.stringify(cacheBounds));
		            localStorage.setItem('wildly_has_offline_map', 'true');
		            
		            progressBar.style.width = '100%';
		            progressText.innerText = '100%';
		
		            setTimeout(() => {
		                overlay.classList.add('hidden');
		                updateCacheStatusUI('success');
		                prepareLayer.off('seedprogress seedend seederror');
		            }, 500);
		        });
		
		        prepareLayer.on('seederror', function(err) {
		            overlay.classList.add('hidden');
		            updateCacheStatusUI('error');
		            prepareLayer.off('seedprogress seedend seederror');
		        });
		
		        // 3. Start download: Vi tvinger den til KUN at hente zoom 16
		        // Dette er lynhurtigt og forhindrer at kortet "hænger"
		        prepareLayer.seed(bounds, 17, 17); 		
		    } catch (e) {
		        if(document.getElementById('offline-download-overlay')) {
		            document.getElementById('offline-download-overlay').classList.add('hidden');
		        }
		        console.error("Download fejl:", e);
		    }
		}
		
		function updateCacheStatusUI(statusType = 'default') {
		    const statusBox = document.getElementById('current-cache-status');
		    const statusStyle = document.getElementById('cache-status-style');

		    if (!statusBox) return;
		
		    // Gør boksen synlig når vi har en besked (udover default som tjekker localStorage)
		    if (statusType !== 'default') {
		        statusBox.classList.remove('hidden');
		    }
		
		    if (statusType === 'success') {
		        statusStyle.className = 'flex items-center gap-2 text-[10px] font-black text-green-800 bg-green-100 px-3 py-1.5 rounded-full w-fit uppercase tracking-widest';
		        statusText.innerText = ui.offline_map_saved;

		        statusStyle.className = 'flex items-center gap-2 text-[10px] font-black text-red-700 bg-red-100 px-3 py-1.5 rounded-full w-fit uppercase tracking-widest';
		        statusText.innerText = ui.offline_map_download_error;

		        const hasMap = localStorage.getItem('wildly_has_offline_map');
		        statusBox.classList.toggle('hidden', !hasMap);

		        }
		    }
		}

		    if (node.id && node.id === targetSpeciesId) {
		        return path;

		    // Hvis noden har svarmuligheder (options)
		    if (node.choices) {
		        for (const choice of node.choices) {
		            // Vi gemmer spørgsmålet og det valgte svar i stien
		            const newPath = [...path, { 
		                question: node.prompt, 
		                answer: choice.match
		            }];
		            
		            const result = findWizardPath(choice, targetSpeciesId, newPath);
		            if (result) return result;
		        }
		    }
		    return null;
		}

				            <div>
				                <div class="id-label mb-4">
				                    ${ui.detail_usage_and_preservation}
				                </div>
				                <p class="text-sm text-stone-800 italic leading-relaxed">${res.preservation}</p>
				                
				                <button onclick="showPreservationGuide()" 
				                        class="w-full flex items-center justify-between bg-white border border-green-200 p-3 rounded-2xl shadow-sm active:scale-[0.98] transition-all">
				                    <div class="flex items-center gap-3">
				                        <span class="text-lg">🍯</span>
				                        <div class="text-left">
				                            <div class="text-[10px] font-black uppercase text-green-800 leading-none">${ui.detail_learn_techniques}</div>
				                            <div class="text-xs text-stone-600 italic">${ui.detail_learn_techniques_guide}</div>
				                        </div>
				                    </div>
				                    <span class="text-green-800 text-xs">→</span>
				                </button>
				            </div>
				            ` : ''}
				        </div>
				    </details>
				    
				    ${res.twin ? `
				    <div class="p-8 rounded-[32px] ${res.twin.toxic ? 'bg-red-50 border-red-200' : 'bg-orange-50 border-orange-200'} border-2 shadow-sm my-4">
				        <div class="flex items-center gap-4 mb-3">
				            ${res.twin.toxic ? `
				            <div class="w-15 h-10 px-2 rounded-full flex items-center justify-center bg-red-700 text-white font-bold">${ui.detail_toxic}</div>
				            ` : ''}
				            <div>
				                <div class="text-[9px] font-black uppercase sans">${ui.detail_lookalike}</div>
				                <div class="text-xl font-black text-stone-900 uppercase italic tracking-tighter sans">${res.twin.name}</div>
				            </div>
				        </div>
				        <p class="text-base font-medium text-stone-800 italic leading-relaxed">${res.twin.diff}</p>
				    </div>
				    ` : ''}
				
				    <div class="grid grid-cols-1 gap-3">
				        <button onclick="window.open('https://www.google.com/search?tbm=isch&q=${encodeURIComponent(res.name + ' ' + res.latin)}', '_blank')" class="w-full p-6 bg-stone-900 text-white rounded-[24px] font-black text-[11px] uppercase tracking-widest text-center btn-active sans shadow-lg">${ui.detail_google_photos} ${ui.of} ${res.name}</button>
				        ${hasTwin ? `
				            <button onclick="window.open('https://www.google.com/search?tbm=isch&q=${encodeURIComponent(res.twin.name + ' ${ui.detail_lookalike_identification}')}', '_blank')" class="w-full p-6 border-2 border-red-700 text-red-700 rounded-[24px] font-black text-[11px] uppercase tracking-widest text-center btn-active sans shadow-lg">${ui.detail_google_lookalike_photos}</button>
				        ` : ''}
				    </div>
				
				    ${renderNaturbasenLink(res.naturbasen)}
				</div>
            `;
        }

        function renderSafety() {
            document.getElementById('app-content').innerHTML = `
                <div class="fade-in space-y-6">
                    <h2 class="text-3xl font-black text-red-700 italic uppercase tracking-tighter sans leading-none">${ui.safety}</h2>
                    <div class="card p-8 space-y-6 border-red-100">
                        <p class="italic text-stone-600 font-medium">${ui.safety_1}</p>
                        <p class="italic text-stone-600 font-medium">${ui.safety_2}</p>
                        <p class="italic text-stone-600 font-medium">${ui.safety_3}</p>
                        <div class="p-5 bg-red-700 text-white rounded-2xl text-center font-black sans uppercase text-sm shadow-lg">${geoData[userSettings.country].poison_phone}</div>
                    </div>
                </div>
            `;
        }

		window.handleWizardChoice = function(index) {
		    // 1. Tjek at valget er gyldigt
		    if (currentWizardNode && currentWizardNode.choices && currentWizardNode.choices[index]) {
		        
		        // 2. Find det næste trin i træet
		        const nextNode = currentWizardNode.choices[index];
		        
		        // 3. Opdater den globale variabel
		        currentWizardNode = nextNode;
		        
		        // 4. VIGTIGT: Brug navigate() i stedet for renderWizard()
		        // Dette gemmer trinnet i historikken, så "Tilbage" virker
		        navigate('wizard', nextNode);
		    }
		};
		
        function renderWizard(node) {
			// SIKRER AT GLOBALE VARIABLE ER SYNKRONISERET
		    if (typeof node === 'object') {
		        currentWizardNode = node;
		    }
			let content = '';

			//Template for Option List
            const wrap = (title, desc, options) => `
                <div class="fade-in space-y-6 text-center">
                    <h2 class="text-2xl font-black italic sans text-stone-900">${title}</h2>
                    <p class="text-stone-600 italic px-4 font-medium">${desc}</p>
                    <div class="grid grid-cols-1 gap-3">${options}</div>
                    <button onclick="navigate('start')" class="mt-4 text-[10px] uppercase font-bold text-stone-600 tracking-widest">${ui.abort}</button>
                </div>`;

			//Template for Option
            const btn = (index, text, text_more) => `
                <button onclick="handleWizardChoice(${index})" class="p-6 card bg-white border border-stone-100 shadow-sm flex flex-col items-start btn-active group">
                    <span class="font-bold sans text-stone-800 text-sm text-left">${text}</span>
                     ${text_more ? `<span class="sans text-stone-600 italic text-sm text-left">${text_more}</span>` : ''}					 
                </button>`;

			// Template for Warnings (Dead ends)
			const renderWarning = (text) => `
				<div class="fade-in p-8 bg-red-50 border-4 border-red-700 rounded-[32px] text-center space-y-6 shadow-xl">
					<div class="text-6xl">⚠️</div>
					<h3 class="text-3xl font-black text-red-700 uppercase sans tracking-tighter">${ui.warning}</h3>
					<p class="font-bold text-red-900 text-lg leading-relaxed">${text}</p>
					<button onclick="navigate('start')" class="w-full p-5 bg-red-700 hover:bg-red-800 text-white rounded-2xl font-bold mt-4 sans uppercase tracking-widest transition-colors shadow-lg">${ui.close}</button>
				</div>`;

			// Template for Notices (Dead ends)
			const renderNotice = (text) => `
				<div class="fade-in p-8 bg-amber-50 border-4 border-amber-700 rounded-[32px] text-center space-y-6 shadow-xl">
					<div class="text-6xl">✋</div>
					<h3 class="text-3xl font-black text-amber-700 uppercase sans tracking-tighter">${ui.notice}</h3>
					<p class="font-bold text-amber-900 text-lg leading-relaxed">${text}</p>
					<button onclick="navigate('start')" class="w-full p-5 bg-amber-700 hover:bg-amber-800 text-white rounded-2xl font-bold mt-4 sans uppercase tracking-widest transition-colors shadow-lg">${ui.understood}</button>
				</div>`;
		
			if (!node || node === 'START') {
				content = wrap(`${ui.wizard}`, `${ui.wizard_observe}`, `
					<button onclick="navigate('wizard', 'STOP_POISON')" class="p-5 card bg-red-700 text-white font-black sans uppercase btn-active">${ui.wizard_observe_yes}</button>
					<button onclick="navigate('wizard', 'PROCEED')" class="p-5 card bg-green-700 text-white font-black sans uppercase btn-active">${ui.wizard_observe_no}</button>
				`); 

				document.getElementById('app-content').innerHTML = content;
				window.scrollTo(0,0);
				return;
			}
			else if (node === 'STOP_POISON') {
				content = `<div class="fade-in p-8 bg-red-50 border-4 border-red-700 rounded-[32px] text-center space-y-4"><h3 class="text-3xl font-black text-red-700 uppercase sans">${ui.wizard_stop}</h3><p class="font-bold text-red-900 italic">${ui.wizard_stop_description}</p><button onclick="navigate('start')" class="w-full p-4 bg-red-700 text-white rounded-2xl font-bold mt-4 sans uppercase">${ui.abort}</button></div>`; 

				document.getElementById('app-content').innerHTML = content;
				window.scrollTo(0,0);
				return;
			}
			else if (node === 'PROCEED') {
				currentWizardNode = wizardMushroomData;
				node = currentWizardNode;
			}
			
			if (node.warning) {
				// CASE: Warning / Dead End
				content = renderWarning(node.warning);
			}
			else if (node.notice) {
				// CASE: Notification / Dead End
				content = renderNotice(node.notice);
			} 
			else if (node.id) {
				// CASE: Identification Successful
				navigate(node.id);
				return;
			} 
			else if (node.choices) {
				// Generate HTML for all buttons based on the 'match' property
				const optionsHtml = node.choices.map((choice, index) => {
					return btn(index, choice.match, choice.text_more);
				}).join('');

				// Use node.prompt for title, and node.description for instructions
				content = wrap(
					node.prompt || `${ui.wizard_please_choose}:`, 
					node.description || "", 
					optionsHtml
				);
			} 
			else {
				// Fallback
				content = `<div class="text-center py-10"><p>${ui.wizard_error}</p><button onclick="navigate('start')">${ui.wizard_restart}</button></div>`;
			}
            document.getElementById('app-content').innerHTML = content;
            window.scrollTo(0,0);
        }
		
        function navigate(pageId, data = null) {
			closeMenuIfOpen();

			// Gemmer tilstanden i browserens historik
		    window.history.pushState({ pageId: pageId, data: data }, "", "");
		    render(pageId, data);
		}
		function goBack() {
		    window.history.back();
		}

		async function getGuessedLocation() {
		    try {
		        const response = await fetch('https://ipapi.co/json/');
		        const data = await response.json();
		        
		        return {
		            lang: data.languages.split(',')[0].split('-')[0], 
		            country: data.country_code
		        };
		    } catch (e) {
		        return null; // Fallback hvis tjenesten er nede
		    }
		}

		async function initApp() {
			try {
				// 1. Hent konfigurationen
				const [configRes, geoRes] = await Promise.all([
				        fetch('config.json'),
				        fetch('geo_data.json')
				    ]);
				appConfig = await configRes.json();
			    geoData = await geoRes.json();
				
				// 2. Tjek om vi har gemte indstillinger, ellers start "Gæt-processen"
				const saved = localStorage.getItem('userSettings');
				if (saved) {
					userSettings = JSON.parse(saved);
				} else {
					// Gæt sprog fra browser
					const urlLang = new URLSearchParams(window.location.search).get('lang');
					const geo = await getGuessedLocation();
					let finalLang = urlLang || (geo ? geo.lang : null) || navigator.language.split('-')[0];
					
					// Hvis browser-sproget ikke findes i vores config, brug 'da' som fallback
					if (!appConfig.languages[finalLang]) {
						finalLang = 'da';
					}
		
					// Find standard-landet for det gættede sprog
					const langData = appConfig.languages[finalLang];
					const countryCode = langData.defaultCountry;
		
					userSettings = {
						lang: finalLang,
						country: countryCode,
						region: geoData[countryCode].regions[0] // Tag første region som default
					};
					
					saveSettings(); // Gem de gættede indstillinger
				}
				
				renderLanguageOptions();
				await handleLangChange(userSettings.lang, false); // false = genindlæs ikke hele siden endnu		
			} catch (err) {
				console.error("Fejl under opstart:", err);
			}

			// Erstat den nuværende "tomme" state med startsiden
		    window.history.replaceState({ pageId: 'start' }, "", "");
		    render('start');
		}
		
		window.onpopstate = function(event) {
			const editor = document.getElementById('location-editor');
		    if (editor) {
		        closeLocationEditor(false);
		        return;
		    }
			
			if (event.state) {
		        render(event.state.pageId, event.state.data);
		    } else {
		        // Fallback hvis historikken er tom
		        render('start');
		    }
		};

		document.addEventListener('DOMContentLoaded', () => {
			// Registrer Service Worker til offline brug
		    if ('serviceWorker' in navigator) {
		        window.addEventListener('load', () => {
		            navigator.serviceWorker.register('./sw.js')
		                .then((registration) => {
		                    console.log('ServiceWorker registrery successfully saved with scope: ', registration.scope);
		                })
		                .catch((error) => {
		                    console.log('ServiceWorker registrery failed: ', error);
		                });
		        });
		    }
			initApp();
			syncMissingMaps();
		});
    </script>
</body>
</html>
